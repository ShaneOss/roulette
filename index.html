<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Vision Pro - Stable</title>
    <style>
        body { margin:0; background:#111; color:#0f0; font-family:monospace; overflow:hidden; }
        video { display:none; }
        canvas { position:absolute; top:0; left:0; width:100vw; height:100vh; }
        #hud { position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.9); padding:15px; border:2px solid #0f0; z-index:100; width:380px; }
    </style>
</head>
<body>
    <div id="hud">
        <h3>ROULETTE VISION PRO</h3>
        <div id="status">STATUS: Starting camera...</div>
        <div id="velocity">VELOCITY: 0 px/s</div>
        <div id="angleInfo">ANGLE: --°</div>
        <div id="prediction">PREDICTION: WAITING...</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        const europeanWheel = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3];

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');

        let prevFrameData = null;
        let prevX = null, prevY = null, prevTime = null;
        let centerX = 0, centerY = 0;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    centerX = canvas.width / 2;
                    centerY = canvas.height / 2;
                    document.getElementById('status').innerText = "STATUS: TRACKING...";
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                document.getElementById('status').innerText = "CAMERA ERROR: " + err.message;
            }
        }

        function getAngle(x, y) {
            const dx = x - centerX;
            const dy = y - centerY;
            let angle = Math.atan2(dy, dx) * (180 / Math.PI);
            return (angle + 360) % 360;
        }

        function processFrame(timestamp) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

            if (!prevFrameData) {
                prevFrameData = new Uint8ClampedArray(pixels);
                requestAnimationFrame(processFrame);
                return;
            }

            let sumX = 0, sumY = 0, count = 0;

            // Scan for bright ball
            for (let y = 60; y < canvas.height - 60; y += 3) {
                for (let x = 60; x < canvas.width - 60; x += 3) {
                    const i = (y * canvas.width + x) * 4;
                    if (pixels[i] > 205 && pixels[i+1] > 205 && pixels[i+2] > 205) {
                        sumX += x;
                        sumY += y;
                        count++;
                    }
                }
            }

            if (count > 5) {
                const currentX = sumX / count;
                const currentY = sumY / count;
                const angle = getAngle(currentX, currentY);

                if (prevX !== null) {
                    const dt = (timestamp - prevTime) / 1000;
                    const velocity = dt > 0 ? Math.round(Math.hypot(currentX - prevX, currentY - prevY) / dt) : 0;

                    document.getElementById('velocity').innerText = `VELOCITY: ${velocity} px/s`;
                    document.getElementById('angleInfo').innerText = `ANGLE: ${angle.toFixed(0)}°`;

                    const sector = europeanWheel[Math.floor((360 - angle) % 360 / (360 / 37))];
                    document.getElementById('prediction').innerText = `PREDICTION: ${sector}`;
                }

                // Draw ball
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(currentX, currentY, 18, 0, Math.PI*2);
                ctx.stroke();

                prevX = currentX;
                prevY = currentY;
                prevTime = timestamp;
            }

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
