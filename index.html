<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Vision Pro - OpenCV Enhanced</title>
    <script src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; }
        video { display:none; }
        canvas { position:absolute; top:0; left:0; width:100vw; height:100vh; }
        #hud { position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.9); padding:15px; border:2px solid #0f0; border-radius:8px; z-index:100; width:380px; }
        #calib { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); padding:20px; border:3px solid #ff0; z-index:200; display:none; text-align:center; }
        button { background:#111; color:#0f0; border:1px solid #0f0; padding:8px 12px; margin:5px; border-radius:5px; }
    </style>
</head>
<body>
    <div id="hud">
        <h3>🎰 ROULETTE VISION PRO - OPENCV</h3>
        <div class="metric" id="status">STATUS: Loading OpenCV...</div>
        <div class="metric" id="ballInfo">SPEED: -- px/s | ANGLE: --°</div>
        <div class="metric highlight" id="prediction">PREDICTION: WAITING...</div>
        <button onclick="startCalibration()">Start Calibration</button>
    </div>

    <div id="calib">
        <h3>4-Point Wheel Calibration</h3>
        <p>Tap the 4 corners of the roulette wheel (TL → TR → BR → BL)</p>
        <button onclick="finishCalibration()">Finish Calibration</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        let cvReady = false;
        let cv = null;
        let video, canvas, ctx;
        let perspectiveMatrix = null;
        let calibrationPoints = [];
        let isCalibrating = false;

        const europeanWheel = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3];

        async function init() {
            video = document.getElementById('webcam');
            canvas = document.getElementById('output');
            ctx = canvas.getContext('2d');

            // Load OpenCV
            document.getElementById('status').textContent = "Loading OpenCV.js... (this may take a moment)";

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: {ideal:1280}, height:{ideal:720} }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            };
        }

        window.cv = null; // Global for OpenCV
        const opencvScript = document.createElement('script');
        opencvScript.src = 'https://docs.opencv.org/4.8.0/opencv.js';
        opencvScript.onload = () => {
            cv = window.cv;
            cvReady = true;
            document.getElementById('status').innerHTML = '✅ OpenCV Ready - Calibrate Wheel';
        };
        document.head.appendChild(opencvScript);

        function startCalibration() {
            isCalibrating = true;
            calibrationPoints = [];
            document.getElementById('calib').style.display = 'block';
        }

        function finishCalibration() {
            if (calibrationPoints.length === 4 && cv) {
                const srcPoints = cv.matFromArray(4, 1, cv.CV_32FC2, calibrationPoints.flat());
                const dstPoints = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, canvas.width,0, canvas.width,canvas.height, 0,canvas.height]);
                perspectiveMatrix = cv.getPerspectiveTransform(srcPoints, dstPoints);
                srcPoints.delete();
                dstPoints.delete();
            }
            document.getElementById('calib').style.display = 'none';
            isCalibrating = false;
        }

        canvas.addEventListener('click', (e) => {
            if (!isCalibrating) return;
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * canvas.width / rect.width);
            const y = Math.round((e.clientY - rect.top) * canvas.height / rect.height);
            calibrationPoints.push(x, y);
        });

        // Basic processing loop (will be expanded with OpenCV detection)
        function processFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            // TODO: Add OpenCV ball detection here
            requestAnimationFrame(processFrame);
        }

        init();
        requestAnimationFrame(processFrame);
    </script>
</body>
</html>
