<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Ballistics Tracker</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: monospace; text-align: center; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; text-align: left; border: 1px solid #333; }
        .metric { color: #00ffcc; font-size: 16px; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="hud">
        <h3>BALLISTICS HUD</h3>
        <div class="metric" id="status">STATUS: SEARCHING...</div>
        <div class="metric" id="velocity">VELOCITY: 0 px/s</div>
        <div class="metric" id="prediction">PRED SECTOR: --</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

<script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        
        let prevFrameData = null;
        let prevX = null, prevY = null, prevTime = null;
        let cameraState = "WIDE"; // Tracks whether we are in wide view or zoomed close-up

        // Define coordinate profiles for both camera angles
        const profiles = {
            WIDE: {
                cx: 640, cy: 450, outerRadius: 150, innerRadius: 80
            },
            ZOOMED: {
                // Update these values once you see where the zoomed wheel lands on your screen
                cx: 640, cy: 380, outerRadius: 220, innerRadius: 120
            }
        };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                alert("Camera access error: " + err);
            }
        }

        function processFrame(timestamp) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            let frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixels = frameData.data;
            
            if (!prevFrameData) {
                prevFrameData = new Uint8ClampedArray(pixels);
                requestAnimationFrame(processFrame);
                return;
            }

            // Simple scene-change detector: if a large amount of pixels change simultaneously, 
            // it's likely the Playtech camera cut.
            let totalDiff = 0;
            for (let i = 0; i < pixels.length; i += 600) { // sampled check for speed
                totalDiff += Math.abs(pixels[i] - prevFrameData[i]);
            }
            if (totalDiff > 500000) {
                // Toggle state on camera cut detection (or default to ZOOMED during spin)
                cameraState = cameraState === "WIDE" ? "ZOOMED" : "WIDE";
            }

            let config = profiles[cameraState];
            let sumX = 0, sumY = 0, count = 0;

            // Scan strictly inside the active profile's radius ring
            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    let dx = x - config.cx;
                    let dy = y - config.cy;
                    let distFromCenter = Math.hypot(dx, dy);
                    
                    if (distFromCenter >= config.innerRadius && distFromCenter <= config.outerRadius) {
                        let i = (y * canvas.width + x) * 4;
                        let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                        
                        let diffR = Math.abs(r - prevFrameData[i]);
                        let diffG = Math.abs(g - prevFrameData[i+1]);
                        let diffB = Math.abs(b - prevFrameData[i+2]);
                        
                        if (r > 210 && g > 210 && b > 210 && (diffR + diffG + diffB > 80)) {
                            sumX += x;
                            sumY += y;
                            count++;
                        }
                    }
                }
            }

            prevFrameData.set(pixels);

            // Draw HUD target ring based on current camera state
            ctx.strokeStyle = cameraState === "ZOOMED" ? '#00ffcc' : '#ffaa00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(config.cx, config.cy, config.outerRadius, 0, 2 * Math.PI);
            ctx.arc(config.cx, config.cy, config.innerRadius, 0, 2 * Math.PI);
            ctx.stroke();

            if (count > 1 && count < 50) {
                let currentX = sumX / count;
                let currentY = sumY / count;
                
                if (prevX !== null && prevTime !== null) {
                    let dt = (timestamp - prevTime) / 1000;
                    if (dt > 0) {
                        let distance = Math.hypot(currentX - prevX, currentY - prevY);
                        let velocity = Math.round(distance / dt);
                        
                        document.getElementById('status').innerText = `STATUS: TRACKING (${cameraState})`;
                        document.getElementById('velocity').innerText = `VELOCITY: ${velocity} px/s`;
                        
                        ctx.strokeStyle = '#ff0055';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 15, 0, 2 * Math.PI);
                        ctx.stroke();
                    }
                }
                prevX = currentX;
                prevY = currentY;
                prevTime = timestamp;
            } else {
                document.getElementById('status').innerText = `STATUS: WAITING (${cameraState})...`;
            }

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
