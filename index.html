<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Vision Pro - Stable</title>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; }
        video { display:none; }
        canvas { position:absolute; top:0; left:0; width:100vw; height:100vh; }
        #hud { position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.9); padding:15px; border:2px solid #0f0; border-radius:8px; z-index:100; width:380px; }
        #calib { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); padding:25px; border:3px solid #ff0; z-index:200; display:none; text-align:center; }
        button { background:#111; color:#0f0; border:1px solid #0f0; padding:8px 12px; margin:5px; border-radius:5px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="hud">
        <h3>ROULETTE VISION PRO</h3>
        <div class="metric" id="status">STATUS: Starting camera...</div>
        <div class="metric" id="ballInfo">SPEED: -- px/s | ANGLE: --°</div>
        <div class="metric highlight" id="prediction">PREDICTION: WAITING...</div>
        <button onclick="startCalibration()">Calibrate Wheel</button>
    </div>

    <div id="calib">
        <h3>4-Point Calibration</h3>
        <p>Tap 4 corners of the wheel:<br>Top-Left → Top-Right → Bottom-Right → Bottom-Left</p>
        <button onclick="finishCalibration()">Finish</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        const europeanWheel = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3];

        let video, canvas, ctx;
        let calibrationPoints = [];
        let isCalibrating = false;
        let trackCenter = { x: 640, y: 360 };

        let prevPos = null;
        let prevTime = null;
        let currentAngle = 0;
        let ballSpeed = 0;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: {ideal:1280}, height:{ideal:720} }
                });
                video = document.getElementById('webcam');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas = document.getElementById('output');
                    ctx = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    trackCenter.x = canvas.width / 2;
                    trackCenter.y = canvas.height / 2;
                    document.getElementById('status').innerHTML = '✅ CAMERA READY - Calibrate if needed';
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ CAMERA FAILED: ' + err.message;
            }
        }

        function startCalibration() {
            isCalibrating = true;
            calibrationPoints = [];
            document.getElementById('calib').style.display = 'block';
        }

        function finishCalibration() {
            if (calibrationPoints.length === 4) {
                trackCenter.x = (calibrationPoints[0] + calibrationPoints[2] + calibrationPoints[4] + calibrationPoints[6]) / 4;
                trackCenter.y = (calibrationPoints[1] + calibrationPoints[3] + calibrationPoints[5] + calibrationPoints[7]) / 4;
            }
            document.getElementById('calib').style.display = 'none';
            isCalibrating = false;
        }

        canvas.addEventListener('click', e => {
            if (!isCalibrating) return;
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));
            calibrationPoints.push(x, y);
        });

        function getAngle(x, y) {
            return ((Math.atan2(y - trackCenter.y, x - trackCenter.x) * 180 / Math.PI) + 360) % 360;
        }

        function processFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let sumX = 0, sumY = 0, count = 0;

            for (let y = 80; y < canvas.height - 80; y += 3) {
                for (let x = 80; x < canvas.width - 80; x += 3) {
                    const i = (y * canvas.width + x) * 4;
                    if (data[i] > 210 && data[i+1] > 210 && data[i+2] > 200) {
                        sumX += x;
                        sumY += y;
                        count++;
                    }
                }
            }

            if (count > 6) {
                const cx = sumX / count;
                const cy = sumY / count;
                const angle = getAngle(cx, cy);

                if (prevPos) {
                    const dt = (Date.now() - prevTime) / 1000;
                    ballSpeed = Math.hypot(cx - prevPos.x, cy - prevPos.y) / dt;
                }

                currentAngle = angle;

                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(cx, cy, 20, 0, Math.PI*2);
                ctx.stroke();

                prevPos = {x: cx, y: cy};
                prevTime = Date.now();

                document.getElementById('ballInfo').innerHTML = `SPEED: ${Math.round(ballSpeed)} px/s | ANGLE: ${angle.toFixed(0)}°`;
                const sector = europeanWheel[Math.floor((360 - angle) % 360 / (360/37))];
                document.getElementById('prediction').innerHTML = `SECTOR: <b>${sector}</b>`;
            }

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
