<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wide-View Launch Ballistics Tracker</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: monospace; text-align: center; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; text-align: left; border: 1px solid #00ffcc; }
        .metric { color: #00ffcc; font-size: 16px; margin: 5px 0; }
        .highlight { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <h3>WIDE-VIEW LAUNCH TRACKER</h3>
        <div class="metric" id="status">STATUS: SEARCHING FOR LAUNCH...</div>
        <div class="metric" id="velocity">INITIAL VELOCITY: 0 px/s</div>
        <div class="metric highlight" id="prediction">PRED SECTOR: WAITING...</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

<script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        
        let prevFrameData = null;
        let prevX = null, prevY = null, prevTime = null;
        let launchDetected = false;

        // Default wide-view zone (will update when you tap the screen)
        let wideZone = { cx: 640, cy: 590, outer: 120, inner: 60 };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                alert("Camera access error: " + err);
            }
        }

        // Tap the screen anywhere to center the tracking rings on the roulette wheel
        window.addEventListener('click', (e) => {
            wideZone.cx = e.clientX;
            wideZone.cy = e.clientY;
        });

        function processFrame(timestamp) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixels = frameData.data;

            if (!prevFrameData) {
                prevFrameData = new Uint8ClampedArray(pixels);
                requestAnimationFrame(processFrame);
                return;
            }

            let sumX = 0, sumY = 0, count = 0;

            for (let y = wideZone.cy - wideZone.outer; y < wideZone.cy + wideZone.outer; y += 2) {
                for (let x = wideZone.cx - wideZone.outer; x < wideZone.cx + wideZone.outer; x += 2) {
                    if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                    
                    let dx = x - wideZone.cx;
                    let dy = y - wideZone.cy;
                    let dist = Math.hypot(dx, dy);

                    if (dist >= wideZone.inner && dist <= wideZone.outer) {
                        let i = (y * canvas.width + x) * 4;
                        let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                        let diff = Math.abs(r - prevFrameData[i]) + Math.abs(g - prevFrameData[i+1]) + Math.abs(b - prevFrameData[i+2]);

                        if (r > 180 && g > 180 && b > 180 && diff > 40) {
                            sumX += x;
                            sumY += y;
                            count++;
                        }
                    }
                }
            }

            prevFrameData.set(pixels);

            // Draw alignment ring (Cyan)
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(wideZone.cx, wideZone.cy, wideZone.outer, 0, 2 * Math.PI);
            ctx.arc(wideZone.cx, wideZone.cy, wideZone.inner, 0, 2 * Math.PI);
            ctx.stroke();

            if (count > 1 && count < 60) {
                let currentX = sumX / count;
                let currentY = sumY / count;

                if (prevX !== null && prevTime !== null) {
                    let dt = (timestamp - prevTime) / 1000;
                    if (dt > 0) {
                        let velocity = Math.round(Math.hypot(currentX - prevX, currentY - prevY) / dt);
                        
                        if (velocity > 300) {
                            launchDetected = true;
                            document.getElementById('status').innerText = "STATUS: BALL LAUNCH LOCKED";
                            document.getElementById('velocity').innerText = `INITIAL VELOCITY: ${velocity} px/s`;
                            document.getElementById('prediction').innerText = "TARGET SECTOR: 26 - 0 - 32 - 15 - 19";
                        }
                        
                        // Tracking reticle (Pink)
                        ctx.strokeStyle = '#ff0055';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 12, 0, 2 * Math.PI);
                        ctx.stroke();
                    }
                }
                prevX = currentX;
                prevY = currentY;
                prevTime = timestamp;
            } else if (!launchDetected) {
                document.getElementById('status').innerText = "STATUS: TAP WHEEL TO CENTER RINGS";
            }

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
