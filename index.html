<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Vision Pro - Wheel Detection</title>
    <script src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; }
        video { display:none; }
        canvas { position:absolute; top:0; left:0; width:100vw; height:100vh; }
        #hud { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.9); padding:15px; border:2px solid #0f0; z-index:100; width:420px; }
    </style>
</head>
<body>
    <div id="hud">
        <h3>ROULETTE VISION PRO</h3>
        <div id="status">STATUS: Starting...</div>
        <div id="fps">FPS: --</div>
        <div id="velocity">VELOCITY: -- px/s</div>
        <div id="angularVel">ANGULAR: -- °/s</div>
        <div id="prediction">PREDICTION: WAITING...</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        let cvReady = false;
        let cv = null;
        let video, canvas, ctx;
        let centerX = 0, centerY = 0;

        const europeanWheel = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3];

        let prevPos = null;
        let prevTime = null;
        let currentAngle = 0;
        let ballSpeed = 0;
        let angularVel = 0;
        let fps = 0, frameCount = 0, fpsStart = Date.now();

        class KalmanFilter {
            constructor() { this.x = 0; this.P = 1; this.R = 0.1; this.Q = 3; }
            update(z) {
                const K = this.P / (this.P + this.R);
                this.x += K * (z - this.x);
                this.P = (1 - K) * this.P + this.Q;
                return this.x;
            }
        }
        const kfSpeed = new KalmanFilter();

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: {ideal:1280}, height:{ideal:720} }
                });
                video = document.getElementById('webcam');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas = document.getElementById('output');
                    ctx = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    centerX = canvas.width / 2;
                    centerY = canvas.height / 2;
                    document.getElementById('status').innerText = 'TRACKING ACTIVE';
                    requestAnimationFrame(processFrame);
                };
            } catch (e) {
                document.getElementById('status').innerText = 'Camera error';
            }
        }

        const script = document.createElement('script');
        script.src = 'https://docs.opencv.org/4.8.0/opencv.js';
        script.onload = () => { cv = window.cv; cvReady = true; };
        document.head.appendChild(script);

        function processFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let sumX = 0, sumY = 0, count = 0;
            let greenSum = 0; // for zero detection

            for (let y = 100; y < canvas.height - 100; y += 4) {
                for (let x = 100; x < canvas.width - 100; x += 4) {
                    const i = (y * canvas.width + x) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];

                    if (r > 210 && g > 210 && b > 200) {
                        sumX += x; sumY += y; count++;
                    }
                    if (g > 180 && r < 100 && b < 100) greenSum++; // green zero area
                }
            }

            if (count > 8) {
                const cx = sumX / count;
                const cy = sumY / count;
                const angle = ((Math.atan2(cy - centerY, cx - centerX) * 180 / Math.PI) + 360) % 360;

                if (prevPos) {
                    const dt = (Date.now() - prevTime) / 1000;
                    ballSpeed = kfSpeed.update(Math.hypot(cx - prevPos.x, cy - prevPos.y) / dt);
                    angularVel = (angle - currentAngle) / dt;
                }

                currentAngle = angle;

                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(cx, cy, 20, 0, Math.PI*2);
                ctx.stroke();

                prevPos = {x: cx, y: cy};
                prevTime = Date.now();

                const sectorIndex = Math.floor((360 - angle) % 360 / (360 / 37));
                const predicted = europeanWheel[sectorIndex];

                document.getElementById('velocity').innerText = `VELOCITY: ${Math.round(ballSpeed)} px/s`;
                document.getElementById('angularVel').innerText = `ANGULAR: ${angularVel.toFixed(1)} °/s`;
                document.getElementById('prediction').innerText = `PREDICTION: ${predicted} ${greenSum > 50 ? '(Near Zero)' : ''}`;
            }

            frameCount++;
            if (Date.now() - fpsStart > 1000) {
                fps = frameCount;
                frameCount = 0;
                fpsStart = Date.now();
            }
            document.getElementById('fps').innerText = `FPS: ${fps}`;

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
