<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Vision Pro - Ballistics Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#0f0; font-family:monospace; overflow:hidden; }
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #hud { position: absolute; top: 12px; left: 12px; background: rgba(10,20,10,0.95); padding: 14px; border: 2px solid #0f0; border-radius: 8px; z-index: 100; width: 340px; }
        .metric { margin: 8px 0; font-size: 15px; }
        button, select { background:#111; color:#0f0; border:1px solid #0f0; padding:8px 12px; margin:5px 3px; border-radius:5px; cursor:pointer; }
        #status { color: #ff0; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <div id="hud">
        <h3>🔬 ROULETTE VISION PRO</h3>
        <div class="metric" id="status">STATUS: Starting camera...</div>
        <div class="metric" id="fps">FPS: --</div>
        <div class="metric" id="ballInfo">BALL SPEED: -- px/s</div>
        <div class="metric highlight" id="prediction">PREDICTION: WAITING...</div>
        
        <button onclick="startCalibration()">Calibrate Wheel</button>
        <button onclick="resetSession()">Reset</button>
        <select id="lastNumSelect"></select>
    </div>

    <script>
        const europeanWheel = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3];

        let video, canvas, ctx;
        let prevBall = null;
        let ball = {x:0, y:0, speed:0};
        let lastTime = null;
        let fps = 0, frameCount = 0, fpsStart = Date.now();
        let isCalibrating = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment", 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }
                });
                video = document.getElementById('webcam');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas = document.getElementById('output');
                    ctx = canvas.getContext('2d', { willReadFrequently: true });
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    document.getElementById('status').innerHTML = '✅ CAMERA READY - Tap "Calibrate Wheel"';
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ CAMERA ERROR: ' + err.message;
                console.error(err);
            }
        }

        function processFrame() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            if (!isCalibrating) {
                detectBall();
            }

            updateHUD();
            requestAnimationFrame(processFrame);
        }

        function detectBall() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            let sumX = 0, sumY = 0, count = 0;

            for (let y = 80; y < canvas.height - 80; y += 4) {
                for (let x = 80; x < canvas.width - 80; x += 4) {
                    const i = (y * canvas.width + x) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];
                    
                    if (r > 210 && g > 210 && b > 190) {
                        sumX += x;
                        sumY += y;
                        count++;
                    }
                }
            }

            if (count >= 5) {
                const currentX = sumX / count;
                const currentY = sumY / count;

                if (prevBall && lastTime) {
                    const dt = (Date.now() - lastTime) / 1000;
                    if (dt > 0) {
                        const speed = Math.hypot(currentX - prevBall.x, currentY - prevBall.y) / dt;
                        ball.speed = Math.round(speed);
                        ball.x = currentX;
                        ball.y = currentY;

                        ctx.strokeStyle = '#f00';
                        ctx.lineWidth = 6;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 22, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                prevBall = {x: currentX, y: currentY};
                lastTime = Date.now();
            }
        }

        function updateHUD() {
            frameCount++;
            if (Date.now() - fpsStart > 1000) {
                fps = frameCount;
                frameCount = 0;
                fpsStart = Date.now();
            }

            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('ballInfo').textContent = `BALL SPEED: ${ball.speed} px/s`;

            if (ball.speed > 250) {
                const lastNum = parseInt(document.getElementById('lastNumSelect').value) || 0;
                const idx = europeanWheel.indexOf(lastNum);
                const offset = Math.floor(ball.speed / 42) % 37;
                const target = europeanWheel[(idx + offset) % 37];
                document.getElementById('prediction').innerHTML = `PREDICTION → <b>${target}</b>`;
            }
        }

        function startCalibration() {
            isCalibrating = true;
            alert("Calibration mode ON\n\nTap the 4 corners of the wheel:\nTop-Left → Top-Right → Bottom-Right → Bottom-Left");
        }

        function resetSession() {
            prevBall = null;
            ball.speed = 0;
        }

        // Populate last number selector
        const sel = document.getElementById('lastNumSelect');
        europeanWheel.forEach(n => {
            const opt = document.createElement('option');
            opt.value = n; opt.textContent = n;
            sel.appendChild(opt);
        });

        // Start the app
        initCamera();
    </script>
</body>
</html>
