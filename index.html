<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel 7 Pro Ballistics Tracker - Live Array</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            color: #fff; 
            font-family: monospace; 
            text-align: center; 
            overflow: hidden; 
        }
        video { 
            display: none; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
        }
        #hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 15px; 
            border-radius: 8px; 
            text-align: left; 
            border: 1px solid #00ffcc; 
        }
        .metric { 
            color: #00ffcc; 
            font-size: 14px; 
            margin: 8px 0; 
        }
        .highlight { 
            color: #ff0055; 
            font-weight: bold; 
            font-size: 16px; 
        }
        select {
            background: #222;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 4px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="hud">
        <h3>BALLISTICS CALCULATOR</h3>
        <div class="metric">
            LAST NUMBER: 
            <select id="lastNumSelect">
                <!-- Populated dynamically with European wheel numbers -->
            </select>
        </div>
        <div class="metric" id="status">STATUS: TAP WHEEL TO CENTER</div>
        <div class="metric" id="velocity">INITIAL VELOCITY: 0 px/s</div>
        <div class="metric highlight" id="prediction">TARGET SECTOR: WAITING...</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        // Official European Wheel Pocket Order (Clockwise)
        const europeanWheel = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 
            13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 
            20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3
        ];

        // Populate the dropdown menu
        const selectEl = document.getElementById('lastNumSelect');
        europeanWheel.forEach(num => {
            let opt = document.createElement('option');
            opt.value = num;
            opt.text = num;
            selectEl.appendChild(opt);
        });

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        
        let prevFrameData = null;
        let prevX = null, prevY = null, prevTime = null;
        let launchDetected = false;
        let lowVelocityFrames = 0;

        // Expanded default zone to fit the outer track
        let wideZone = { cx: 640, cy: 360, outer: 180, inner: 100 };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    wideZone.cx = canvas.width / 2;
                    wideZone.cy = canvas.height / 2;
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                alert("Camera access error or denied: " + err);
            }
        }

        // Tap-to-center calibration
        window.addEventListener('click', (e) => {
            // Ignore clicks if clicking directly on the dropdown menu
            if (e.target.tagName === 'SELECT') return;

            wideZone.cx = e.clientX * (canvas.width / window.innerWidth);
            wideZone.cy = e.clientY * (canvas.height / window.innerHeight);
            launchDetected = false;
            lowVelocityFrames = 0;
        });

        function processFrame(timestamp) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixels = frameData.data;

            if (!prevFrameData) {
                prevFrameData = new Uint8ClampedArray(pixels);
                requestAnimationFrame(processFrame);
                return;
            }

            let sumX = 0, sumY = 0, count = 0;

            // Scan inside the annular track ring
            for (let y = Math.floor(wideZone.cy - wideZone.outer); y < wideZone.cy + wideZone.outer; y += 2) {
                for (let x = Math.floor(wideZone.cx - wideZone.outer); x < wideZone.cx + wideZone.outer; x += 2) {
                    if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                    
                    let dx = x - wideZone.cx;
                    let dy = y - wideZone.cy;
                    let dist = Math.hypot(dx, dy);

                    if (dist >= wideZone.inner && dist <= wideZone.outer) {
                        let i = (y * canvas.width + x) * 4;
                        let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                        let diff = Math.abs(r - prevFrameData[i]) + Math.abs(g - prevFrameData[i+1]) + Math.abs(b - prevFrameData[i+2]);

                        if (r > 180 && g > 180 && b > 180 && diff > 40) {
                            sumX += x;
                            sumY += y;
                            count++;
                        }
                    }
                }
            }

            prevFrameData.set(pixels);

            // Draw alignment target ring (Cyan)
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(wideZone.cx, wideZone.cy, wideZone.outer, 0, 2 * Math.PI);
            ctx.arc(wideZone.cx, wideZone.cy, wideZone.inner, 0, 2 * Math.PI);
            ctx.stroke();

            if (count > 1 && count < 80) {
                let currentX = sumX / count;
                let currentY = sumY / count;

                if (prevX !== null && prevTime !== null) {
                    let dt = (timestamp - prevTime) / 1000;
                    if (dt > 0) {
                        let velocity = Math.round(Math.hypot(currentX - prevX, currentY - prevY) / dt);
                        
                        if (velocity > 250 && !launchDetected) {
                            launchDetected = true;
                            lowVelocityFrames = 0;
                            document.getElementById('status').innerText = "STATUS: BALL LAUNCH LOCKED";
                            document.getElementById('velocity').innerText = `INITIAL VELOCITY: ${velocity} px/s`;
                            
                            // Get selected last winning number from dropdown
                            let lastNum = parseInt(document.getElementById('lastNumSelect').value);
                            let lastIndex = europeanWheel.indexOf(lastNum);

                            // Calculate target pocket offset based on launch velocity decay mapping
                            let pocketOffset = Math.floor(velocity / 35) % europeanWheel.length;
                            let targetIndex = (lastIndex + pocketOffset) % europeanWheel.length;

                            // Build a 5-pocket neighborhood (2 left, target, 2 right)
                            let p1 = europeanWheel[(targetIndex - 2 + europeanWheel.length) % europeanWheel.length];
                            let p2 = europeanWheel[(targetIndex - 1 + europeanWheel.length) % europeanWheel.length];
                            let target = europeanWheel[targetIndex];
                            let p3 = europeanWheel[(targetIndex + 1) % europeanWheel.length];
                            let p4 = europeanWheel[(targetIndex + 2) % europeanWheel.length];

                            document.getElementById('prediction').innerText = `TARGET SECTOR: ${p1} - ${p2} - [ ${target} ] - ${p3} - ${p4}`;
                        } else if (launchDetected && velocity < 80) {
                            lowVelocityFrames++;
                            if (lowVelocityFrames > 30) {
                                launchDetected = false;
                                prevX = null;
                                prevY = null;
                                document.getElementById('status').innerText = "STATUS: READY FOR NEXT SPIN...";
                                document.getElementById('prediction').innerText = "TARGET SECTOR: WAITING...";
                            }
                        }
                        
                        // Active ball tracking reticle (Pink)
                        ctx.strokeStyle = '#ff0055';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 12, 0, 2 * Math.PI);
                        ctx.stroke();
                    }
                }
                prevX = currentX;
                prevY = currentY;
                prevTime = timestamp;
            } else {
                if (!launchDetected) {
                    document.getElementById('status').innerText = "STATUS: WAITING FOR DEALER SPIN...";
                }
            }

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
