<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel 7 Pro Ballistics Tracker - Elliptical View</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            color: #fff; 
            font-family: monospace; 
            text-align: center; 
            overflow: hidden; 
        }
        video { 
            display: none; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
        }
        #hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 15px; 
            border-radius: 8px; 
            text-align: left; 
            border: 1px solid #00ffcc; 
        }
        .metric { 
            color: #00ffcc; 
            font-size: 14px; 
            margin: 8px 0; 
        }
        .highlight { 
            color: #ff0055; 
            font-weight: bold; 
            font-size: 16px; 
        }
        select {
            background: #222;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 4px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="hud">
        <h3>ELLIPTICAL BALLISTICS TRACKER</h3>
        <div class="metric">
            LAST NUMBER: 
            <select id="lastNumSelect"></select>
        </div>
        <div class="metric" id="status">STATUS: TAP OVAL CENTER</div>
        <div class="metric" id="velocity">INITIAL VELOCITY: 0 px/s</div>
        <div class="metric highlight" id="prediction">TARGET SECTOR: WAITING...</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        // Official European Wheel Pocket Order (Clockwise physical layout)
        const europeanWheel = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 
            13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 
            20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3
        ];

        // Populate dropdown menu in numerical order (0 to 36)
        const selectEl = document.getElementById('lastNumSelect');
        Array.from({length: 37}, (_, i) => i).forEach(num => {
            let opt = document.createElement('option');
            opt.value = num;
            opt.text = num;
            selectEl.appendChild(opt);
        });

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        
        let prevFrameData = null;
        let prevX = null, prevY = null, prevTime = null;
        let launchDetected = false;
        let missingFrames = 0;

        // Elliptical zone parameters to match camera perspective tilt
        // rx = horizontal radius, ry = vertical radius (squashed for perspective)
        let trackZone = { 
            cx: 640, cy: 360, 
            rxOuter: 220, ryOuter: 140, 
            rxInner: 150, ryInner: 95 
        };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    trackZone.cx = canvas.width / 2;
                    trackZone.cy = canvas.height / 2;
                    requestAnimationFrame(processFrame);
                };
            } catch (err) {
                alert("Camera access error or denied: " + err);
            }
        }

        // Tap anywhere on the screen to center the elliptical tracking zone
        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'SELECT') return;

            trackZone.cx = e.clientX * (canvas.width / window.innerWidth);
            trackZone.cy = e.clientY * (canvas.height / window.innerHeight);
            launchDetected = false;
            missingFrames = 0;
        });

        function processFrame(timestamp) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixels = frameData.data;

            if (!prevFrameData) {
                prevFrameData = new Uint8ClampedArray(pixels);
                requestAnimationFrame(processFrame);
                return;
            }

            let sumX = 0, sumY = 0, count = 0;

            // Scan inside the perspective-correct elliptical track ring
            let scanXMin = Math.floor(trackZone.cx - trackZone.rxOuter);
            let scanXMax = Math.ceil(trackZone.cx + trackZone.rxOuter);
            let scanYMin = Math.floor(trackZone.cy - trackZone.ryOuter);
            let scanYMax = Math.ceil(trackZone.cy + trackZone.ryOuter);

            for (let y = scanYMin; y < scanYMax; y += 2) {
                for (let x = scanXMin; x < scanXMax; x += 2) {
                    if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                    
                    let dx = x - trackZone.cx;
                    let dy = y - trackZone.cy;

                    // Ellipse boundary equations
                    let outerCheck = (dx * dx) / (trackZone.rxOuter * trackZone.rxOuter) + (dy * dy) / (trackZone.ryOuter * trackZone.ryOuter);
                    let innerCheck = (dx * dx) / (trackZone.rxInner * trackZone.rxInner) + (dy * dy) / (trackZone.ryInner * trackZone.ryInner);

                    // Must be inside outer ellipse AND outside inner ellipse
                    if (outerCheck <= 1.0 && innerCheck >= 1.0) {
                        let i = (y * canvas.width + x) * 4;
                        let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                        let diff = Math.abs(r - prevFrameData[i]) + Math.abs(g - prevFrameData[i+1]) + Math.abs(b - prevFrameData[i+2]);

                        // Strict brightness + movement check for the ball, ignoring shirts/lighting
                        if (r > 200 && g > 200 && b > 200 && diff > 60) {
                            sumX += x;
                            sumY += y;
                            count++;
                        }
                    }
                }
            }

            prevFrameData.set(pixels);

            // Draw Perspective-Correct Cyan Ellipse Guides on HUD
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.ellipse(trackZone.cx, trackZone.cy, trackZone.rxOuter, trackZone.ryOuter, 0, 0, 2 * Math.PI);
            ctx.ellipse(trackZone.cx, trackZone.cy, trackZone.rxInner, trackZone.ryInner, 0, 0, 2 * Math.PI);
            ctx.stroke();

            // Sphere size validation filter (3 to 25 pixels)
            if (count >= 3 && count <= 25) {
                missingFrames = 0; 
                let currentX = sumX / count;
                let currentY = sumY / count;

                if (prevX !== null && prevTime !== null) {
                    let dt = (timestamp - prevTime) / 1000;
                    if (dt > 0) {
                        let velocity = Math.round(Math.hypot(currentX - prevX, currentY - prevY) / dt);
                        
                        if (velocity > 300 && !launchDetected) {
                            launchDetected = true;
                            document.getElementById('status').innerText = "STATUS: BALL LAUNCH LOCKED";
                            document.getElementById('velocity').innerText = `INITIAL VELOCITY: ${velocity} px/s`;
                            
                            let lastNum = parseInt(document.getElementById('lastNumSelect').value);
                            let lastIndex = europeanWheel.indexOf(lastNum);

                            let pocketOffset = Math.floor(velocity / 35) % europeanWheel.length;
                            let targetIndex = (lastIndex + pocketOffset) % europeanWheel.length;

                            let p1 = europeanWheel[(targetIndex - 2 + europeanWheel.length) % europeanWheel.length];
                            let p2 = europeanWheel[(targetIndex - 1 + europeanWheel.length) % europeanWheel.length];
                            let target = europeanWheel[targetIndex];
                            let p3 = europeanWheel[(targetIndex + 1) % europeanWheel.length];
                            let p4 = europeanWheel[(targetIndex + 2) % europeanWheel.length];

                            document.getElementById('prediction').innerText = `TARGET SECTOR: ${p1} - ${p2} - [ ${target} ] - ${p3} - ${p4}`;
                        }
                        
                        // Active ball tracking reticle (Pink)
                        ctx.strokeStyle = '#ff0055';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 12, 0, 2 * Math.PI);
                        ctx.stroke();
                    }
                }
                prevX = currentX;
                prevY = currentY;
                prevTime = timestamp;
            } else {
                if (launchDetected) {
                    missingFrames++;
                    if (missingFrames > 40) {
                        launchDetected = false;
                        prevX = null;
                        prevY = null;
                        missingFrames = 0;
                        document.getElementById('status').innerText = "STATUS: READY FOR NEXT SPIN...";
                        document.getElementById('prediction').innerText = "TARGET SECTOR: WAITING...";
                        document.getElementById('velocity').innerText = "INITIAL VELOCITY: 0 px/s";
                    }
                } else {
                    document.getElementById('status').innerText = "STATUS: WAITING FOR BALL LAUNCH...";
                }
            }

            requestAnimationFrame(processFrame);
        }

        initCamera();
    </script>
</body>
</html>
